# ============================================================
#  COMMON CONFIGURATION — audit-worker
# ============================================================
server:
  port: 8082

spring:
  application:
    name: audit-worker
  jackson:
    deserialization:
      fail-on-unknown-properties: true

# ============================================================
#  INFRASTRUCTURE CONFIGURATION (Environment-Driven)
#  Contains: Database, JPA/Hibernate, Kafka consumer/producer, and Logging
# ============================================================
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/audit_worker_db
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 16
      minimum-idle: 4
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate.format_sql: true

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:29092}
    consumer:
      group-id: audit-worker-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

logging:
  level:
    root: INFO
    com.services.auditworker: INFO
    org.springframework.kafka: INFO

# ============================================================
#  APPLICATION CONFIGURATION (Business-Driven)
#  Contains: Audit event topic names, listener concurrency, retry policies
# ============================================================

audit:
  worker:
    topic: wallet.transaction.events
    dlt-topic: wallet.transaction.events.DLT
    listener-concurrency: 3
    retry:
      max-retries: 3
      initial-interval-ms: 1000
      multiplier: 2.0
      max-interval-ms: 4000
