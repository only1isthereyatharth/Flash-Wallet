server:
  port: 8081

spring:
  application:
    name: wallet-core

  # Database Configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/wallet_core_db
    username: user
    password: 1234
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 32
      minimum-idle: 10
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  # JPA / Hibernate Configurations
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate.format_sql: true
      hibernate.jdbc.batch_size: 25
      hibernate.order_inserts: true
      hibernate.order_updates: true

  # Redis / Redisson Config (Passed to custom Config bean)
  data:
    redis:
      url: redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: "true"
        max.in.flight.requests.per.connection: "5"

logging:
  level:
    root: INFO
    com.services: DEBUG
    org.hibernate.SQL: INFO
    org.redisson: INFO
