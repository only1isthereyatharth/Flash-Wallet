# ============================================================
#  COMMON CONFIGURATION — api-gateway
# ============================================================
server:
  port: 8080

spring:
  application:
    name: api-gateway

# ============================================================
#  INFRASTRUCTURE CONFIGURATION (Environment-Driven)
#  Contains: Upstream services, Gateway timeouts, Actuator, Security, and Logging
# ============================================================
  cloud:
    gateway:
      httpclient:
        connect-timeout: ${flash.gateway.http-client.connect-timeout-ms}
        response-timeout: ${flash.gateway.http-client.response-timeout-ms}ms
      metrics:
        enabled: true
        tags:
          path:
            enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,redisRateLimitStore
  prometheus:
    metrics:
      export:
        enabled: true

flash:
  gateway:
    services:
      wallet-core-uri: ${WALLET_CORE_URI:http://localhost:8081}
    http-client:
      connect-timeout-ms: ${GATEWAY_CONNECT_TIMEOUT_MS:3000}
      response-timeout-ms: ${GATEWAY_RESPONSE_TIMEOUT_MS:10000}
    logging:
      log-headers: ${GATEWAY_LOG_HEADERS:false}
      slow-request-threshold-ms: ${GATEWAY_SLOW_REQUEST_THRESHOLD_MS:2000}
      max-header-value-length: ${GATEWAY_MAX_HEADER_VALUE_LENGTH:120}
    security:
      hsts-enabled: ${GATEWAY_HSTS_ENABLED:false}

logging:
  level:
    root: INFO
    com.services.apigateway: INFO
    org.springframework.cloud.gateway: INFO
    reactor.netty.http.client: INFO
    io.github.resilience4j: INFO

# ============================================================
#  APPLICATION CONFIGURATION (Business-Driven)
#  Contains: Circuit Breaker, CORS, Idempotency, and Rate Limiting
# ============================================================
spring:
  jackson:
    deserialization:
      fail-on-unknown-properties: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: ${GATEWAY_CB_SLIDING_WINDOW_SIZE:10}
        failure-rate-threshold: ${GATEWAY_CB_FAILURE_RATE_THRESHOLD:50}
        slow-call-duration-threshold: ${GATEWAY_CB_SLOW_CALL_DURATION:5s}
        slow-call-rate-threshold: ${GATEWAY_CB_SLOW_CALL_RATE_THRESHOLD:80}
        wait-duration-in-open-state: ${GATEWAY_CB_WAIT_DURATION_OPEN:30s}
        permitted-number-of-calls-in-half-open-state: ${GATEWAY_CB_HALF_OPEN_CALLS:3}
        minimum-number-of-calls: ${GATEWAY_CB_MIN_CALLS:5}
    instances:
      walletCoreCircuitBreaker:
        base-config: default

flash:
  gateway:
    cors:
      allowed-origins:
        - ${FRONTEND_ORIGIN:http://localhost:5173}
      allowed-methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowed-headers:
        - Content-Type
        - Idempotency-Key
        - X-Request-Id
        - X-Client-Id
        - X-Client
        - Authorization
      exposed-headers:
        - X-Request-Id
    idempotency:
      strict-uuid: ${GATEWAY_STRICT_IDEMPOTENCY_UUID:true}
      required-paths:
        - /api/v1/wallets/transfer
        - /api/v1/wallets/deposit
    rate-limit:
      replenish-rate: ${GATEWAY_RATE_LIMIT_REPLENISH_RATE:10}
      burst-capacity: ${GATEWAY_RATE_LIMIT_BURST_CAPACITY:20}
      requested-tokens: ${GATEWAY_RATE_LIMIT_REQUESTED_TOKENS:1}
    resilience:
      circuit-breaker:
        enabled: ${GATEWAY_CIRCUIT_BREAKER_ENABLED:true}
